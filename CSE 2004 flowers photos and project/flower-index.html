    function renderSection(rows, mountId) {
      const mount = document.getElementById(mountId);
      rows
        .forEach(([flower, meaning]) => {
          const row = document.createElement("div");
          row.className = "meta-row two-col";
          row.innerHTML = `
            <div>${flower}</div>
            <div>${meaning}</div>
          `;
          mount.appendChild(row);
        });
    }
