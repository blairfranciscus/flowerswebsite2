<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Garden - The Language of Flowers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1><a class="site-title-link" href="index.html">The Language of Flowers</a></h1>
    <div class="divider"></div>

    <nav class="seed-nav" aria-label="Project navigation">
      <a class="button-link" href="garden.html" aria-current="page">Garden</a>
      <a class="button-link" href="arrangement.html">Arrangement</a>
      <a class="button-link" href="flower-index.html">Catalog</a>
      <a class="button-link" href="about.html">About</a>
    </nav>

    <p class="home-intro">
      A collection of flowers organized by emotion and meaning. Hover to see each flower's message, then open the
      page to learn more.
    </p>

    <div id="groupedFlowers"></div>
        <div class="return-home atelier-footer">
          <a href="../index.html">Atelier</a>
        </div>
      </main>

  <script src="flowers-data.js"></script>
  <script>
    const root = document.getElementById("groupedFlowers");
    const categoryOrder = [
      "Love & Affection",
      "Grief & Loss",
      "Hope & Vitality",
      "Warning & Caution",
      "Fortune & Ambition",
      "Reflection & Character"
    ];

    const imageMap = {
      amaryllis: "Amaryllis.png",
      anemone: "Anemone.png",
      "apple-blossom": "Apple Blossom.png",
      azalea: "Azalea.png",
      aster: "Aster.png",
      "baby-s-breath": "Baby's Breath.png",
      basil: "Basil.png",
      begonia: "Begonia.png",
      bluebell: "Bluebell.png",
      buttercup: "Buttercup.png",
      cattail: "Cattail.png",
      camellia: "Camellia.png",
      carnation: "Carnation.png",
      chamomile: "Chamomile.png",
      chrysanthemum: "Chrysanthemum.png",
      clematis: "Celmatis.png",
      clover: "Clover.png",
      columbine: "Columbine.png",
      cornflower: "Cornflower.png",
      crocus: "Crocus.png",
      cypress: "Cypress.png",
      daffodil: "Daffodil.png",
      dahlia: "Dahlia.png",
      daisy: "Daisy.png",
      dandelion: "Dandelion.png",
      datura: "Datura.png",
      dogwood: "Dogwood.png",
      edelweiss: "Edelweiss.png",
      eucalyptus: "Eucalyptus.png",
      fern: "Fern.png",
      "forget-me-not": "Forget-Me-Not.png",
      foxglove: "Foxglove.png",
      gladiolus: "Gladiolus.png",
      hawthorn: "Hawthorn.png",
      heather: "Heather.png",
      hemlock: "Hemlock.png",
      holly: "Holly.png",
      honeysuckle: "Honeysuckle.png",
      hydrangea: "Hydrangea.png",
      hyacinth: "Hyacinth.png",
      hyssop: "Hyssop.png",
      iris: "Iris.png",
      ivy: "Ivy.png",
      jasmine: "Jasmine.png",
      laurel: "Laurel.png",
      lavender: "Lavender.png",
      lilac: "Lilac.png",
      lily: "Lily.png",
      magnolia: "Magnolia.png",
      marigold: "Marigold.png",
      mistletoe: "Mistletoe.png",
      oleander: "Oleander.png",
      olive: "Olive.png",
      orchid: "Orchid.png",
      pansy: "Pansy.png",
      peony: "Peony.png",
      petunia: "Petunia.png",
      poppy: "Poppy.png",
      rose: "Rose.png",
      rosemary: "Rosemary.png",
      snapdragon: "Snapdragon.png",
      sunflower: "Sunflower.png",
      "sweet-pea": "Sweet Pea.png",
      tansy: "Tansy.png",
      thistle: "Thistle.png",
      tulip: "Tulip.png",
      violet: "Violet.png",
      wheat: "Wheat.png",
      yarrow: "Yarrow.png",
      zinnia: "Zinnia.png"
    };

    function slugify(value) {
      return value
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function categorize(meaning) {
      const m = meaning.toLowerCase();
      if (/(love|devotion|affection|heart|grace|fidelity|amiability|friendship)/.test(m)) return "Love & Affection";
      if (/(grief|mourning|heartache|forsaken|dejection|remorse|desertion)/.test(m)) return "Grief & Loss";
      if (/(hope|joy|happiness|cheer|energy|youthful|encouragement|good luck)/.test(m)) return "Hope & Vitality";
      if (/(caution|beware|hate|envy|disdain|indifference|ill-tempered|snare|ingratitude)/.test(m)) return "Warning & Caution";
      if (/(prosperity|profit|riches|abundance|glory|success)/.test(m)) return "Fortune & Ambition";
      return "Reflection & Character";
    }

    const grouped = {};
    categoryOrder.forEach((category) => {
      grouped[category] = [];
    });

    const availableFlowers = FLOWERS.filter((flower) => imageMap[slugify(flower.name)]);

    availableFlowers.forEach((flower) => {
      grouped[categorize(flower.meaning)].push(flower);
    });

    categoryOrder.forEach((category) => {
      const flowers = grouped[category].sort((a, b) => a.name.localeCompare(b.name));
      if (!flowers.length) return;

      const section = document.createElement("section");
      section.className = "grouped-section";
      section.innerHTML = `<div class="grouped-title">${category}</div><div class="tile-grid"></div>`;
      const grid = section.querySelector(".tile-grid");

      flowers.forEach((flower) => {
        const slug = slugify(flower.name);
        const card = document.createElement("a");
        card.className = "flower-tile";
        card.href = slug === "carnation" ? "carnation.html" : `flowers/${slug}.html`;

        card.innerHTML = `
          <div class="tile-image">
            <img src="${imageMap[slug]}" alt="${flower.name} illustration">
            <div class="tile-overlay">
              <div class="tile-name">${flower.name}</div>
              <div class="tile-meaning">${flower.meaning}</div>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });

      root.appendChild(section);
    });
  </script>
</body>
</html>
